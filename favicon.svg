<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#040706"/>

  <!--
    "[r]" mark — mirrors the nav logo style:
    left bracket, "r" initial, right bracket
    All in the phosphor-green brand colour.
  -->

  <!-- Left bracket [ -->
  <path d="M7 8 L5 8 L5 24 L7 24" stroke="#00ff6e" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Letter "r" -->
  <path d="M11 14 L11 22 M11 16 Q14 13 16 15" stroke="#00ff6e" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Right bracket ] -->
  <path d="M20 8 L22 8 L22 24 L20 24" stroke="#00ff6e" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Blinking cursor dot (static in the favicon, animates on the site) -->
  <rect x="24" y="20" width="3" height="4" rx="0.5" fill="#00ff6e" opacity="0.8"/>
</svg>
